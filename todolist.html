<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todolist</title>
  <link rel="stylesheet" href="todolist.css">
  
</head>
<body>
  <div class="container">
    <div class="todo-app">
      <h2>TO-DO-LIST <img class="todoicon" src="todoImages/icon.png"></h2>
      <div class="row">
        <input type="text" placeholder="Add Task" id="inputBox" onkeydown="keyEnter(event)">
        <button onclick="addTask()">Add</button>
      </div>  
      <ul class="list-container" >
          <!-- Tasks will be loaded here -->
      </ul>
    </div>
  </div>
  <script src="todoData.js"></script>
  <script src="todolist.js"></script>
</body>
</html>
